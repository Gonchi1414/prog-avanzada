<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Estudiante</title>
    <style>
                /* Estilos generales para el fondo de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            /* Color de fondo gris claro/azulado */
            display: flex;
            justify-content: center;
            /* Centra el contenido horizontalmente */
            align-items: center;
            /* Centra el contenido verticalmente */
            height: 100vh;
            /* Ocupa el 100% de la altura de la pantalla */
            margin: 4;
        }

        /* Forma básica 1: Un rectángulo con bordes redondeados para la tarjeta principal */
        .tarjeta {
            background-color: white;
            /* agregado: degradacion de color*/
            background: linear-gradient(135deg, #17011b 0%, #b712f8 100%);

            padding: 40px;
            border-radius: 15px;
            /* Esta propiedad redondea las esquinas del rectángulo */
            box-shadow: 0 10px 25px rgba(49, 236, 2, 0.08);
            /* Agrega una sombra suave para dar efecto de profundidad */
            text-align: center;
            max-width: 4000px;
        }

        /* Forma básica 2: Un círculo perfecto para simular una foto de perfil o avatar */
        .circulo-foto {
            width: 120px;
            /* Ancho del elemento */
            height: 120px;
            /* Alto del elemento (igual al ancho para que sea simétrico) */
            background: linear-gradient(135deg, #210127 0%, #1d0a49 100%);
            /* Fondo con degradado de colores */
            border-radius: 65%;
            /* Poner el border-radius al 50% convierte un cuadrado en un círculo perfecto */
            margin: 0 auto 20px auto;
            /* Centra el círculo dentro de la tarjeta y le da espacio abajo */

            /* Estas tres líneas centran la letra 'A' exactamente en el medio del círculo */
            display: flex;
            justify-content: center;
            align-items: center;

            color: rgb(251, 255, 6);
            /*agregado: color degradado a la inicial M*/
            background: linear-gradient(135deg, #d16e11 0%, lab(14.33% 14.81 19.48) 100%);

            font-size: 45px;
            font-weight: bold;
        }

        /* Estilos para el texto de la tarjeta */
        h1 {
            margin: 0 0 5px;
            color: #2ee9f7;
        }

        h3 {
            margin: 0 0 15px;
            color: #190127;
            font-weight: normal;
        }

        p {
            color: #fbff00;
            line-height: 2.1;
        }
    </style>
</head>

<!-- La etiqueta <body> contiene todo el contenido visual y estructural que el usuario verá en la pantalla -->

<body>

    <!-- <div> es un contenedor genérico. Lo usamos para agrupar los elementos de nuestra tarjeta -->
    <div class="tarjeta">

        <!-- Aquí usamos nuestro "círculo" creado con CSS en la etiqueta <style>. Adentro va la inicial del nombre -->
        <div class="circulo-foto">
            M
        </div>

        <!-- <h1> es el encabezado principal y más grande. Usualmente se usa para el título o el nombre -->
        <h1>Mariela Alvarez Mejia</h1>

        <!-- <h3> es un encabezado de menor jerarquía, ideal para subtítulos como la carrera del estudiante -->
        <h3>Estudiante en Ingenieria de Sistemas</h3>

        <!-- <p> representa un párrafo de texto común -->
        <p>
            ¡Hola! Soy estudiante en Ingenieria de Sistemas, cursando la materia de Programacion Avanzada con 
            la finalidad de que durante el trayecto se comprenda el Full Stack
        </p>

    </div>

</body>

</html>
